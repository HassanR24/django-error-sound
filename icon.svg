<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#FF4444" opacity="0.95"/>
  
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="48" fill="#FF6666"/>
  
  <!-- Sound waves (left side) -->
  <path d="M 20 64 Q 20 50, 28 50" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 20 64 Q 20 78, 28 78" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 10 64 Q 10 42, 22 42" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 10 64 Q 10 86, 22 86" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Sound waves (right side) -->
  <path d="M 108 64 Q 108 50, 100 50" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 108 64 Q 108 78, 100 78" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 118 64 Q 118 42, 106 42" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 118 64 Q 118 86, 106 86" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Exclamation mark (dramatic emphasis) -->
  <rect x="59" y="42" width="10" height="32" rx="5" fill="#FFFFFF"/>
  <circle cx="64" cy="82" r="6" fill="#FFFFFF"/>
  
  <!-- "Screaming" effect with additional small circles -->
  <circle cx="48" cy="35" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="80" cy="35" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="38" cy="45" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="90" cy="45" r="2" fill="#FFFFFF" opacity="0.5"/>
</svg>
